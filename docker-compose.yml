services:
  relay:
    build: .
    image: arcway-relay:local
    environment:
      ALLOWED_ORIGINS: https://${DOMAIN}
    volumes:
      - arcway-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    depends_on:
      relay:
        condition: service_healthy

volumes:
  arcway-data:
  caddy-data:
  caddy-config:
